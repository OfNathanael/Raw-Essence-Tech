<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raw Essence</title>

    <!-- ── Raw Essence Logo ───────────────────────────────────────────────── -->
    <link rel="icon" type="image/x-icon" href="/design.ico" />
    <meta name="theme-color" content="#0a0f0a" />

    <!-- ── Preload styles (load non-blocking) ───────────────────── -->
    <link
      rel="preload"
      href="styles.css"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <!-- Critical inline CSS for above-the-fold (small) -->
    <style>
      :root {
        --bg: #0a0f0a;
        --surface: #111a11;
        --card: #152015;
        --border: #2d5c2d;
        --gold: #4ade80;
        --gold2: #22c55e;
        --text: #e8f5e8;
        --muted: #86a886;
      }
      html,
      body,
      #root {
        min-height: 100vh;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          "DM Sans",
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--surface);
        border-bottom: 2px solid var(--gold2);
        box-shadow: 0 4px 24px #4ade8015;
        padding: 0 24px;
      }
      .header-inner {
        max-width: 1200;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 64px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }
      .logo img {
        height: 38px;
        object-fit: contain;
      }
      .hero {
        background: linear-gradient(
          160deg,
          #0d2010 0%,
          #0a1a0a 40%,
          #060f06 100%
        );
        border-bottom: 1px solid var(--border);
        padding: 72px 24px 60px;
        min-height: 55vh;
        color: #fff;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 11px 22px;
        border-radius: 10px;
        border: none;
        font-family:
          "DM Sans",
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-gold {
        background: linear-gradient(135deg, var(--gold), var(--gold2));
        color: #0a0f0a;
      }
      .input {
        width: 100%;
        padding: 11px 14px;
        border-radius: 10px;
        background: var(--bg);
        border: 1.5px solid var(--border);
        color: var(--text);
        font-family:
          "DM Sans",
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        font-size: 14px;
      }
    </style>
    <!-- Integration shims: define no-op globals so bundle can run before integration scripts load -->
    <script>
      (function () {
        // Firebase
        if (typeof window.firebaseEnabled !== "function") {
          window.firebaseEnabled = function () {
            return false;
          };
        }
        if (typeof window.fbRead !== "function") {
          window.fbRead = function () {
            return Promise.reject(new Error("fbRead not available"));
          };
        }
        if (typeof window.fbWrite !== "function") {
          window.fbWrite = function () {
            return Promise.reject(new Error("fbWrite not available"));
          };
        }
        // ImgBB
        if (typeof window.imgbbEnabled !== "function") {
          window.imgbbEnabled = function () {
            return false;
          };
        }
        if (typeof window.imgbbUpload !== "function") {
          window.imgbbUpload = function () {
            return Promise.reject(new Error("imgbbUpload not available"));
          };
        }
        // EmailJS
        if (typeof window.emailjsEnabled !== "function") {
          window.emailjsEnabled = function () {
            return false;
          };
        }
        if (typeof window.emailjsSendOrder !== "function") {
          window.emailjsSendOrder = function () {
            return Promise.reject(new Error("emailjsSendOrder not available"));
          };
        }
      })();
    </script>
    <!-- removed preloads for legacy script files (now bundled into dist/bundle.js) -->

    <!-- ── DNS prefetch & preconnect ─────────────────────────────── -->
    <!-- Removed Google Fonts preconnect to avoid external font fetch failures when offline -->
    <link rel="preconnect" href="https://unpkg.com" crossorigin="anonymous" />
    <link rel="dns-prefetch" href="https://api.imgbb.com" />
    <link rel="dns-prefetch" href="https://api.emailjs.com" />
    <link rel="dns-prefetch" href="https://firebaseio.com" />

    <!-- ── Fonts — non-blocking ───────────────────────────────────── -->
    <!-- Using system font stack to avoid external font dependency -->

    <!-- ── Styles (fallback for no-JS) ───────────────────────────── -->
    <noscript>
      <link rel="stylesheet" href="styles.css" />
    </noscript>

    <!-- ── Skeleton loader — dark theme ──────────────────────────── -->
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        background: #0a0f0a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #2d5c2d;
        border-top-color: #4ade80;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #app-loader p {
        color: #86a886;
        font-size: 14px;
        font-family: sans-serif;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- ── Skeleton loader ────────────────────────────────────────── -->
    <div id="app-loader">
      <div class="spinner"></div>
      <p>Loading store…</p>
    </div>

    <!-- ── React root ─────────────────────────────────────────────── -->
    <div id="root"></div>

    <!-- ================================================================
       All scripts are at the bottom of <body> — never blocks paint.
       Load order matters — do not rearrange.
       ================================================================ -->

    <!-- ── App bundle (deferred) ─────────────────────────────────-- -->
    <!-- This file lives at dist/index.html alongside dist/bundle.js,
         so the path is relative ("bundle.js"), NOT "dist/bundle.js" -->
    <script src="bundle.js" defer></script>

    <!-- ── Load non-critical integration scripts after first paint/idle --- -->
    <script>
      (function loadIntegrations() {
        function loadScript(src) {
          var s = document.createElement("script");
          s.src = src;
          s.async = true;
          document.body.appendChild(s);
        }

        function schedule() {
          try {
            if ("requestIdleCallback" in window) {
              requestIdleCallback(
                function () {
                  loadScript("firebase.js");
                  loadScript("imgbb.js");
                  loadScript("emailjs.js");
                },
                { timeout: 200 },
              );
            } else if ("requestAnimationFrame" in window) {
              requestAnimationFrame(function () {
                setTimeout(function () {
                  loadScript("firebase.js");
                  loadScript("imgbb.js");
                  loadScript("emailjs.js");
                }, 120);
              });
            } else {
              setTimeout(function () {
                loadScript("firebase.js");
                loadScript("imgbb.js");
                loadScript("emailjs.js");
              }, 300);
            }
          } catch (e) {
            setTimeout(function () {
              loadScript("firebase.js");
              loadScript("imgbb.js");
              loadScript("emailjs.js");
            }, 400);
          }
        }

        if (document.readyState === "complete") schedule();
        else window.addEventListener("load", schedule, { once: true });
      })();
    </script>

    <!-- ── Hide skeleton once React has mounted ───────────────────── -->
    <script>
      (function waitForApp() {
        var loader = document.getElementById("app-loader");
        var root = document.getElementById("root");
        if (root && root.children.length > 0) {
          loader.classList.add("hidden");
          setTimeout(function () {
            loader.remove();
          }, 350);
        } else {
          setTimeout(waitForApp, 50);
        }
      })();
    </script>
  </body>
</html>
